server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # --- CORREÇÃO DO ERRO MIME TYPE ---
    # Carrega os tipos padrão do Nginx e força o tipo correto para js e mjs (módulos)
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }
    # ----------------------------------

    # Gzip compression
    gzip on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de arquivos estáticos para performance (adicionei 'mjs' aqui)
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}